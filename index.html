<!doctype html>
<html lang="en">
    <head>
        <link rel="manifest" href="./manifest.json" />
        <meta name="theme-color" content="#f6b7cd" />
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>melodyPlayer</title>
        <link rel="icon" type="image/png" href="./assets/icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="card">
            <div class="card-content">
                <!-- Draggable title bar -->
                <div class="titlebar" id="titlebar">
                    <div class="titlebar-label">✿ MelodyPlayer ✿</div>
                </div>

                <div class="player-shell">
                    <!-- Song info -->
                    <div class="song-info">
                        <div class="marquee-wrapper">
                            <div class="marquee" id="songName">── no song selected ──</div>
                        </div>
                        <div class="song-counter" id="songCounter">0 / 0</div>
                    </div>

                    <!-- Album art / visualizer area -->
                    <div class="card-area">
                        <div class="card-frame">
                            <div class="card-inner" id="cardInner">
                                <div class="card-idle">
                                    <div class="idle-icon">♫</div>
                                    <p class="idle-text">no song loaded</p>
                                </div>
                                <div class="song-display" id="songDisplay" style="display: none">
                                    <div class="vinyl-ring" id="vinylRing"></div>
                                    <div class="song-title-display" id="songTitleDisplay"></div>
                                </div>
                            </div>
                            <div class="corner tl"></div>
                            <div class="corner tr"></div>
                            <div class="corner bl"></div>
                            <div class="corner br"></div>
                        </div>
                        <div class="deco-hearts">
                            <span class="dh" style="top: 4px; left: 8px; font-size: 10px">♡</span>
                            <span class="dh" style="top: 4px; right: 8px; font-size: 10px">♡</span>
                            <span class="dh" style="bottom: 4px; left: 8px; font-size: 8px">♡</span>
                            <span class="dh" style="bottom: 4px; right: 8px; font-size: 8px"
                                >♡</span
                            >
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="progress-area">
                        <span class="time-label" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-thumb" id="progressThumb"></div>
                        </div>
                        <span class="time-label" id="totalTime">0:00</span>
                    </div>

                    <!-- Controls -->
                    <div class="purple-place">
                        <div class="controls">
                            <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
                            <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause">
                                <span id="playIcon">▶</span>
                            </button>
                            <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
                        </div>
                        <div class="bottom-bar">
                            <button class="menu-btn" id="menuBtn">Menu</button>
                            <div class="hearts-row">
                                <span class="heart" id="h1">♡</span>
                                <span class="heart" id="h2">♡</span>
                                <span class="heart" id="h3">♡</span>
                            </div>
                        </div>
                    </div>

                    <!-- Playlist panel -->
                    <div class="playlist-panel" id="playlistPanel">
                        <div class="playlist-header">
                            <span>✿ playlist ✿</span>
                            <button class="close-playlist" id="closePlaylist">✕</button>
                        </div>
                        <div class="playlist-actions">
                            <!-- hidden file input, triggered by button -->
                            <input
                                type="file"
                                id="fileInput"
                                accept=".mp3,.wav,.ogg,.flac,.m4a,.aac"
                                multiple
                                hidden
                            />
                            <button class="load-btn" id="loadFolderBtn">📂 load songs</button>
                        </div>
                        <ul class="playlist-list" id="playlistList">
                            <li class="playlist-empty">load songs to start ♡</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <audio id="audioPlayer"></audio>
        <script src="script.js"></script>
    </body>
</html>
